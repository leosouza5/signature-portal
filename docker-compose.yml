version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: signature_portal_db
    environment:
      POSTGRES_DB: ${DB_NAME:-signature_portal}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
